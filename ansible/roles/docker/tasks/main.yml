---
- name: Install docker dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
- name: Add docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
- name: Add docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: present
- name: Install docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
    update_cache: true
- name: Start docker service
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Generate container nginx config
  ansible.builtin.template:
    src: "{{ playbook_dir }}/roles/nginx/templates/load-balancer.conf.j2"
    dest: /etc/nginx/nginx-container.conf
  vars:
    nginx_port: "{{ nginx_container_port }}"
  when: "'webservers' in group_names"

- name: Start nginx container
  community.docker.docker_container:
    name: nginx-balancer
    image: nginx:latest
    state: started
    restart_policy: always
    network_mode: host
    volumes:
      - /etc/nginx/nginx-container.conf:/etc/nginx/conf.d/default.conf:ro
  when: "'webservers' in group_names"
